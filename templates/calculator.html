<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Minimalista</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="calculator-container">
        <button id="toggleMode">🌙</button>
        <div class="calculator" id="calculator">
            <input type="text" id="display" readonly placeholder="0">
            <button class="function" onclick="clearDisplay()">C</button>
            <button class="function" onclick="backspace()">⌫</button>
            <button class="operator" onclick="addToDisplay('%')">%</button>
            <button class="operator" onclick="addToDisplay('/')">÷</button>
            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button>
            <button class="operator" onclick="addToDisplay('*')">×</button>
            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button>
            <button class="operator" onclick="addToDisplay('-')">-</button>
            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>
            <button onclick="addToDisplay('3')">3</button>
            <button class="operator" onclick="addToDisplay('+')">+</button>
            <button onclick="addToDisplay('0')">0</button>
            <button onclick="addToDisplay('.')">.</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
        <div class="upload-section">
            <label for="background_image" class="upload-label">Seleccionar archivo</label>
            <input type="file" id="background_image" name="background_image" accept="image/*" style="display: none;">
            <button id="uploadButton" disabled>Agregar Fondo</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/calculator.js') }}"></script>
</body>
</html>

    <title>Calculadora </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="calculator">
        <div class="toggle-container">
            <input type="checkbox" id="theme-toggle">
            <label for="theme-toggle" class="toggle-label"></label>
        </div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn gray" onclick="clearDisplay()">C</button>
            <button class="btn gray" onclick="deleteLast()">⌫</button>
            <button class="btn gray" onclick="appendCharacter('%')">%</button>
            <button class="btn orange" onclick="appendCharacter('/')">÷</button>

            <button class="btn" onclick="appendCharacter('7')">7</button>
            <button class="btn" onclick="appendCharacter('8')">8</button>
            <button class="btn" onclick="appendCharacter('9')">9</button>
            <button class="btn orange" onclick="appendCharacter('*')">×</button>

            <button class="btn" onclick="appendCharacter('4')">4</button>
            <button class="btn" onclick="appendCharacter('5')">5</button>
            <button class="btn" onclick="appendCharacter('6')">6</button>
            <button class="btn orange" onclick="appendCharacter('-')">−</button>

            <button class="btn" onclick="appendCharacter('1')">1</button>
            <button class="btn" onclick="appendCharacter('2')">2</button>
            <button class="btn" onclick="appendCharacter('3')">3</button>
            <button class="btn orange" onclick="appendCharacter('+')">+</button>

            <button class="btn zero" onclick="appendCharacter('0')">0</button>
            <button class="btn" onclick="appendCharacter('.')">.</button>
            <button class="btn orange" onclick="calculateResult()">=</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
